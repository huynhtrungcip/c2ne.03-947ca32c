version: '3.8'

services:
  # AI Engine - Python FastAPI with MegaLLM + Ingest endpoint
  ai-engine:
    build: ./ai-engine
    container_name: soc-ai-engine
    ports:
      - "8000:8000"
    environment:
      - MEGALLM_API_KEY=${MEGALLM_API_KEY}
      - MEGALLM_BASE_URL=${MEGALLM_BASE_URL:-https://ai.megallm.io/v1}
      - MEGALLM_DEFAULT_MODEL=${MEGALLM_DEFAULT_MODEL:-deepseek-r1-distill-llama-70b}
      - PFSENSE_HOST=${PFSENSE_HOST:-10.10.10.254}
      - PFSENSE_PORT=${PFSENSE_PORT:-8080}
      - PFSENSE_API_KEY=${PFSENSE_API_KEY}
      - PFSENSE_ALIAS=${PFSENSE_ALIAS:-AI_Blocked_IP}
      - WHITELIST_IPS=${WHITELIST_IPS}
      - NODEJS_BACKEND_URL=http://soc-backend:3001
    volumes:
      - ./ai-engine/artifacts:/app/artifacts
      - ai-data:/app/database
    restart: unless-stopped
    networks:
      - soc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Node.js Backend
  soc-backend:
    build: ./server
    container_name: soc-backend
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - WS_PORT=3002
      - AI_ENGINE_URL=http://ai-engine:8000
    volumes:
      - backend-data:/app/data
    depends_on:
      ai-engine:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - soc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend - React/Vite served by Nginx
  soc-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=http://localhost:3001
        - VITE_WS_URL=ws://localhost:3002
        - VITE_AI_URL=http://localhost:8000
    container_name: soc-frontend
    ports:
      - "8080:80"
    depends_on:
      soc-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - soc-network

networks:
  soc-network:
    driver: bridge

volumes:
  backend-data:
  ai-data:
