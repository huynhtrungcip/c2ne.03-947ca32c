# ============================================================
# SOC Dashboard - False Positive Reduction System
# Docker Compose Production Configuration
# Author: C1NE.03 Team - Cybersecurity K28 - Duy Tan University
# ============================================================

services:
  # ==================== AI Engine ====================
  # Python FastAPI with MegaLLM integration
  ai-engine:
    build: 
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: soc-ai-engine
    ports:
      - "8000:8000"
    environment:
      - MEGALLM_API_KEY=${MEGALLM_API_KEY}
      - MEGALLM_BASE_URL=${MEGALLM_BASE_URL:-https://ai.megallm.io/v1}
      - MEGALLM_DEFAULT_MODEL=${MEGALLM_DEFAULT_MODEL:-deepseek-r1-distill-llama-70b}
      - PFSENSE_HOST=${PFSENSE_HOST:-10.10.10.254}
      - PFSENSE_PORT=${PFSENSE_PORT:-8080}
      - PFSENSE_API_KEY=${PFSENSE_API_KEY}
      - PFSENSE_ALIAS=${PFSENSE_ALIAS:-AI_Blocked_IP}
      - WHITELIST_IPS=${WHITELIST_IPS}
      - NODEJS_BACKEND_URL=http://soc-backend:3001
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ai-artifacts:/app/artifacts
      - ai-database:/app/database
      - ai-logs:/app/logs
    restart: unless-stopped
    networks:
      - soc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ==================== Node.js Backend ====================
  # REST API + WebSocket Server + SQLite Database
  soc-backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: soc-backend
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - WS_PORT=3002
      - DB_PATH=/app/data/soc_events.db
      - AI_ENGINE_URL=http://ai-engine:8000
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - backend-data:/app/data
    depends_on:
      ai-engine:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - soc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ==================== Frontend ====================
  # React/Vite served by Nginx with reverse proxy
  soc-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3001}
        - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:3002}
        - VITE_AI_URL=${VITE_AI_URL:-http://localhost:8000}
    container_name: soc-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      soc-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - soc-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ==================== Networks ====================
networks:
  soc-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ==================== Volumes ====================
volumes:
  backend-data:
    driver: local
  ai-artifacts:
    driver: local
  ai-database:
    driver: local
  ai-logs:
    driver: local
